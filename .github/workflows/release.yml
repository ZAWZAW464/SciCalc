name: Release Signed APK

on:
  push:
    tags:
      - 'v*'    # Triggers on tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Manual trigger from Actions tab
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew || true

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          java -Xmx2048m -Dfile.encoding=UTF-8 \
            -jar gradle/wrapper/gradle-wrapper.jar \
            assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Rename APK
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/*.apk release-artifacts/SciCalc-${{ github.ref_name }}.apk 2>/dev/null || \
          cp app/build/outputs/apk/release/*.apk release-artifacts/SciCalc-release.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SciCalc-release-apk
          path: release-artifacts/*.apk

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.keystore

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.apk
          name: SciCalc ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## SciCalc ${{ github.ref_name }}

            Signed release APK built automatically by GitHub Actions.

            ### Installation
            1. Download `SciCalc-${{ github.ref_name }}.apk` below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK to install
